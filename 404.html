<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Face Animation</title>
<style>
    /* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }
  
  /* Root Variables */
  :root{
    --hue:223;
    --sat:10%;
    --light:hsl(var(--hue), var(--sat), 95%);
    --dark:hsl(var(--hue), var(--sat), 5%);
    --trans-dur:0.3s;
    font-size:clamp(1rem, 0.95rem + 0.25vw, 1.25rem);
  }
  
  /* Body */
  body{
    height:100vh;
    display:grid;
    place-items:center;
    background:var(--light);
    color:var(--dark);
    font-family:sans-serif;
    transition:background var(--trans-dur), color var(--trans-dur);
  }
  
  /* SVG */
  .face{
    display:block;
    width:12em;
    height:auto;
  }
  
  
  .face__eyes,
  .face__eye-lid,
  .face__mouth-left,
  .face__mouth-right,
  .face__nose,
  .face__pupil{
    animation:eyes 1s 0.3s cubic-bezier(0.65,0,0.35,1) forwards;
  }
  
  /* Blinking + Looking */
  .face__eye-lid,
  .face__pupil{
    animation-duration:4s;
    animation-delay:1.3s;
    animation-iteration-count:infinite;
  }
  
  .face__eye-lid{
    animation-name:eye-lid;
  }
  
  .face__pupil{
    animation-name:pupil;
  }
  
  .face__mouth-left{
    animation-name:mouth-left;
    animation-timing-function:cubic-bezier(0.33,1,0.68,1);
  }
  
  .face__mouth-right{
    animation-name:mouth-right;
    animation-timing-function:cubic-bezier(0.33,1,0.68,1);
  }
  
  .face__nose{
    animation-name:nose;
  }
  
  /* ---------------- Animations ---------------- */
  
  @keyframes eyes{
    from{
      transform:translateY(112.5px);
    }
    to{
      transform:translateY(15px);
    }
  }
  
  @keyframes eye-lid{
    from,40%,45%,to{
      transform:translateY(0);
    }
    42.5%{
      transform:translateY(17.5px);
    }
  }
  
  @keyframes pupil{
    from,37.5%,40%,45%,87.5%,to{
      stroke-dashoffset:0;
      transform:translate(0,0);
    }
    12.5%,25%,62.5%,75%{
      transform:translate(-35px,0);
    }
    42.5%{
      stroke-dashoffset:35;
      transform:translate(0,17.5px);
    }
  }
  
  @keyframes mouth-left{
    from,50%{
      stroke-dashoffset:-102;
    }
    to{
      stroke-dashoffset:0;
    }
  }
  
  @keyframes mouth-right{
    from,50%{
      stroke-dashoffset:102;
    }
    to{
      stroke-dashoffset:0;
    }
  }
  
  @keyframes nose{
    from{
      transform:translate(0,0);
    }
    to{
      transform:translate(0,22.5px);
    }
  }
  
</style>
</head>
<body>


<!-- REMOVE -->
  <h1>“Your one subscribe motivates me 1000%.”</h1>
  <a href="https://www.youtube.com/@Free-Code-Zone" 
     target="_blank" 
     style="display:inline-block; padding:12px 25px; background:red; color:white; 
            text-decoration:none; border-radius:6px; font-size:18px; font-family:sans-serif;">
    Subscribe Now
  </a>
  <!-- REMOVE -->

<main>
  <svg class="face" viewBox="0 0 320 380" width="320" height="380"
    aria-label="A 404 becomes a face, looks to the sides, and blinks.">
    
    <g fill="none" stroke="currentColor" stroke-linecap="round"
       stroke-linejoin="round" stroke-width="25">

      <!-- Eyes -->
      <g class="face__eyes" transform="translate(0, 112.5)">
        <g transform="translate(15, 0)">
          <polyline class="face__eye-lid" points="37,0 0,120 75,120" />
          <polyline class="face__pupil" points="55,120 55,155"
            stroke-dasharray="35 35" />
        </g>

        <g transform="translate(230, 0)">
          <polyline class="face__eye-lid" points="37,0 0,120 75,120" />
          <polyline class="face__pupil" points="55,120 55,155"
            stroke-dasharray="35 35" />
        </g>
      </g>

      <!-- Nose -->
      <rect class="face__nose" rx="4" ry="4"
        x="132.5" y="112.5" width="55" height="155" />

      <!-- Mouth -->
      <g stroke-dasharray="102 102" transform="translate(65, 334)">
        <path class="face__mouth-left"
          d="M 0 30 C 0 30 40 0 95 0"
          stroke-dashoffset="-102" />
        <path class="face__mouth-right"
          d="M 95 0 C 150 0 190 30 190 30"
          stroke-dashoffset="102" />
      </g>

    </g>
  </svg>
</main>

</body>
</html>
